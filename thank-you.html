<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - TL PRO Framing</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px 20px;
            background: #f7f7f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 50px;
            border-radius: 10px;
            border-top: 5px solid #F5B400; /* 呼应品牌色 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2B2B2B;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #666;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 30px;
            background: #F5B400;
            color: black;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #e0a500;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✔ Thank You!</h1>
        <p>Your request has been sent successfully.</p>
        <p>Tony and the team will contact you shortly.</p>

        <a href="index.html" class="btn">Back to Home</a>
    </div>

</body>
</html>
